# Copy to Streamlit Cloud → Settings → Secrets (never commit real passwords)

# --- Recommended for Streamlit Cloud: Transaction pooler URI ---
# Supabase → Project Settings → Database → Connection string → Transaction pooler → URI
# SUPABASE_DB_URL = "postgresql://postgres.yzhsrqjxzkadsvbzcbqz:YOUR_PASSWORD@aws-0-REGION.pooler.supabase.com:6543/postgres"

# --- Or separate pooler fields ---
SUPABASE_PROJECT_REF = "yzhsrqjxzkadsvbzcbqz"
SUPABASE_DB_POOLER_HOST = "aws-0-REGION.pooler.supabase.com"
SUPABASE_DB_POOLER_PORT = "6543"
SUPABASE_DB_PASSWORD = "your-database-password"
# User must be postgres.PROJECT_REF when using pooler:
SUPABASE_DB_USER = "postgres.yzhsrqjxzkadsvbzcbqz"
SUPABASE_DB_NAME = "postgres"

# Direct connection (db.xxx:5432) often fails on Streamlit Cloud — local dev only:
# SUPABASE_DB_HOST = "db.yzhsrqjxzkadsvbzcbqz.supabase.co"
# SUPABASE_DB_PORT = "5432"
# SUPABASE_DB_USER = "postgres"

ADMIN_PASSWORD = "your-admin-password"
DEEPSEEK_API_KEY = ""
